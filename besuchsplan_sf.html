
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title></title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%;background:linear-gradient(160deg,#f8f9fd 0%,#edf0f8 40%,#e4e9f4 100%);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
body{display:flex;justify-content:center;align-items:center;overflow-x:hidden}
.lang-switch{position:fixed;top:12px;right:16px;z-index:100;display:flex;gap:4px;font-size:14px;font-weight:600}
.lang-switch button{padding:6px 12px;border:1px solid #1565c0;background:rgba(255,255,255,.9);color:#1565c0;border-radius:4px;cursor:pointer;transition:all .2s}
.lang-switch button:hover{background:#e3f2fd}
.lang-switch button.active{background:#1565c0;color:#fff;border-color:#1565c0}
.slide-wrap{width:100vw;height:100vh;position:relative;overflow:hidden;background:linear-gradient(160deg,#f8f9fd 0%,#edf0f8 40%,#e4e9f4 100%)}
.slide-inner{position:absolute;left:50%;top:50%;width:2400px;height:1080px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.25);border-radius:6px}
.slide-mobile{display:none;width:100%;max-width:100%;min-height:100vh;flex-direction:column;background:linear-gradient(160deg,#f8f9fd 0%,#edf0f8 50%,#e4e9f4 100%);padding:12px;padding-bottom:24px}
.accent-bar{position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#1565c0,#1976d2,#42a5f5,#1976d2,#1565c0);border-radius:6px 6px 0 0}
.title{position:absolute;top:10px;width:100%;text-align:center;font-size:34px;font-weight:700;color:#0d47a1;letter-spacing:.5px}
.subtitle{position:absolute;top:52px;width:100%;text-align:center;font-size:17px;color:#5c6bc0;font-weight:400;letter-spacing:.3px}
.h-line{position:absolute;left:50px;right:50px;height:5px;background:linear-gradient(90deg,#1565c0,#1e88e5,#1565c0);border-radius:2px;z-index:3}
.wk-label{position:absolute;font-size:25px;color:#90a4ae;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;z-index:4}
.connector-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.dot{position:absolute;width:30px;height:30px;border-radius:50%;border:2.5px solid rgba(255,255,255,.92);background:#1565c0;transform:translate(-50%,-50%);box-shadow:0 2px 6px rgba(0,0,0,.22);z-index:6}
.stem{position:absolute;width:2px;transform:translateX(-50%);z-index:2;border-radius:1px;background:#1565c0;opacity:.35}
.day-box{position:absolute;border-radius:8px;padding:10px 12px;background:rgba(255,255,255,.88);box-shadow:0 2px 12px rgba(0,0,0,.07);border:1px solid rgba(21,101,192,.1);z-index:5}
.day-date{font-size:16px;font-weight:700;color:#0d47a1;margin-bottom:5px;padding-bottom:4px;border-bottom:1.5px solid rgba(21,101,192,.12)}
.day-box.weekend-date{background:rgba(215,235,255,.88)}
.day-event{display:flex;align-items:flex-start;gap:7px;margin-top:5px}
.ev-bullet{width:12px;height:12px;border-radius:50%;margin-top:10px;flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,.15)}
.ev-text{font-size:23.5px;line-height:1.4;color:#37474f}
.ev-text.highlight{font-weight:700}
.legend{position:absolute;top:78px;left:50%;transform:translateX(-50%);display:flex;gap:28px;z-index:7}
.legend-item{display:flex;align-items:center;gap:10px;font-size:30px;color:#455a64}
.legend-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.start-mk{position:absolute;width:18px;height:18px;border-radius:50%;background:#0d47a1;transform:translate(-50%,-50%);box-shadow:0 2px 4px rgba(0,0,0,.15);z-index:6}
.end-mk{position:absolute;z-index:6}
@media (max-width:768px){
  body{overflow:auto;align-items:stretch;padding:0;-webkit-overflow-scrolling:touch}
  .slide-wrap{display:none!important}
  .slide-mobile{display:flex!important}
  .lang-switch{top:8px;right:12px;font-size:13px}
  .lang-switch button{padding:5px 10px}
  .m-title{font-size:22px;padding:8px 0 2px}
  .m-subtitle{font-size:14px;padding-bottom:12px}
  .m-timeline{padding-left:20px;border-left:3px solid #1565c0;margin-left:10px;position:relative;padding-bottom:20px}
  .m-timeline::after{content:'';position:relative;top:43px;left:-32px;width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:14px solid #1565c0}
  .m-day{margin-bottom:16px;position:relative}
  .m-day::before{content:'';position:absolute;left:-30px;top:8px;width:14px;height:14px;border-radius:50%;background:#1565c0;border:2px solid rgba(255,255,255,.9);box-shadow:0 1px 4px rgba(0,0,0,.2)}
  .m-day-box{background:rgba(255,255,255,.92);border-radius:8px;padding:12px 14px;margin-left:4px;border:1px solid rgba(21,101,192,.12);box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .m-day-box.weekend-date{background:rgba(215,235,255,.92)}
  .m-day-date{font-size:15px;font-weight:700;color:#0d47a1;margin-bottom:6px;padding-bottom:4px;border-bottom:1.5px solid rgba(21,101,192,.15)}
  .m-day-event{display:flex;align-items:flex-start;gap:8px;margin-top:6px}
  .m-ev-bullet{width:10px;height:10px;border-radius:50%;margin-top:5px;flex-shrink:0}
  .m-ev-text{font-size:15px;line-height:1.45;color:#37474f}
  .m-ev-text.highlight{font-weight:700}
  .m-legend{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;padding:12px 0 16px;font-size:14px;color:#455a64}
  .m-legend-item{display:flex;align-items:center;gap:6px}
  .m-legend-dot{width:10px;height:10px;border-radius:50%}
}
@media (min-width:769px){
  html,body{overflow:hidden}
  .slide-mobile{display:none!important}
}
.translating{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;z-index:200;font-size:18px;color:#1565c0;font-weight:600}
@media print{.lang-switch{display:none!important}html,body{background:#fff}.slide-wrap{box-shadow:none;display:block!important}.slide-mobile{display:none!important}}
</style>
</head>
<body>
<div class="lang-switch" id="langSwitch">
  <button data-lang="de" class="active">DE</button>
  <button data-lang="en">EN</button>
</div>
<div class="slide-wrap" id="slideWrap">
  <div class="slide-inner" id="slide">
    <div class="accent-bar"></div>
    <div class="title" id="titleEl"></div>
    <div class="subtitle" id="subtitleEl"></div>
  </div>
</div>
<div class="slide-mobile" id="slideMobile"></div>
<div class="translating" id="translating" style="display:none">Translating…</div>
<script>
var TITLE_DE='Frühlingsbesuch 2026 in San Francisco';
var WEEK_DE='Woche';
var LEGEND_DE='Reise, Schule, Familie, Aktivitäten, Freizeit, Besonderes';
var LEGEND_KEYS=['travel','school','family','activity','leisure','special'];
var EVENTS=[
  [
    {d:'Donnerstag, 19. März',ev:[
      {t:'Bahnfahrt zum Flughafen, Abfahrt 8:31 Uhr in Gotha, Ankunft 11:15 Uhr',c:'travel'},
      {t:'Flug nach San Francisco – Abflug Frankfurt um 13:20 Uhr, Ankunft in San Francisco um 16:55 Uhr Ortszeit',c:'travel'}
    ]},
    {d:'Freitag, 20. März',ev:[
      {t:'Emilia um 7:30 Uhr morgens zur Schule bringen',c:'school'},
      {t:'Tagsüber ausruhen und vom Jetlag erholen',c:'leisure'},
      {t:'Nachmittags gemeinsame Familienzeit genießen',c:'family'}
    ]},
    {d:'Samstag, 21. März',ev:[
      {t:'Emilias Fußballspiel von 11:00 Uhr bis 12:00 Uhr',c:'activity'},
      {t:'Nachmittags Tanzprobe von Leo und Emilia für das Schneewittchen-Ballett von 14:30 Uhr bis 16:30 Uhr',c:'activity'}
    ]},
    {d:'Sonntag, 22. März',ev:[
      {t:'Familientag – den ganzen Sonntag gemeinsam als Familie verbringen',c:'family'}
    ]},
    {d:'Montag, 23. März',ev:[
      {t:'Emilia morgens um 7:30 Uhr zur Schule bringen und nachmittags um 14:30 Uhr wieder abholen',c:'school'},
      {t:'Der restliche Tag steht zur freien Verfügung',c:'leisure'}
    ]},
    {d:'Dienstag, 24. März',ev:[
      {t:'Emilia morgens zur Schule bringen',c:'school'},
      {t:'Bei Interesse den ganzen Tag mit Leo verbringen',c:'family',h:true},
      {t:'Tanzunterricht für Emilia und Leo ab 16:00 Uhr mit kleiner Aufführung um 17:15 Uhr',c:'activity'}
    ]},
    {d:'Mittwoch, 25. März',ev:[
      {t:'Emilia morgens zur Schule bringen',c:'school'},
      {t:'Emilia um 15:00 Uhr abholen und mit dem Bus zum Fußballtraining fahren',c:'activity'}
    ]}
  ],
  [
    {d:'Donnerstag, 26. März',ev:[
      {t:'Emilia morgens zur Schule bringen',c:'school'},
      {t:'Mutter-Sohn-Tag – Martin nimmt sich den Tag frei',c:'family',h:true},
      {t:'Geigenunterricht am späten Nachmittag für beide Kinder (17:15–18:15 Uhr)',c:'activity'}
    ]},
    {d:'Freitag, 27. März',ev:[
      {t:'Emilias Frühlingsferien beginnen!',c:'special',h:true},
      {t:'Den ganzen Tag mit Emilia verbringen',c:'family'}
    ]},
    {d:'Samstag, 28. März',ev:[
      {t:'Familientag – den ganzen Samstag gemeinsam als Familie verbringen',c:'family'}
    ]},
    {d:'Sonntag, 29. März',ev:[
      {t:'Geburtstagsfeier: Aiyanas 5. Geburtstag – wir sind gebeten mitzuhelfen',c:'special',h:true}
    ]},
    {d:'Montag, 30. März',ev:[
      {t:'Den ganzen Tag mit Emilia verbringen',c:'family'}
    ]},
    {d:'Dienstag, 31. März',ev:[
      {t:'Den ganzen Tag mit Emilia verbringen',c:'family'}
    ]},
    {d:'Mittwoch, 1. April',ev:[
      {t:'Den ganzen Tag mit Emilia verbringen',c:'family'},
      {t:'Rückflug ab San Francisco um 19:15 Uhr, Ankunft Frankfurt am Donnerstag, 2. April um 15:15 Uhr Ortszeit',c:'travel'}
    ]}
  ]
];
var CONNECTOR_LEFT=50,CONNECTOR_RIGHT=2350;
var SX=170,EX=2230,BW=300,Y_TOP=150,Y_BOT=1020,LEGEND_OFFSET=50;
var C={travel:'#c62828',school:'#1565c0',family:'#2e7d32',activity:'#e65100',leisure:'#7b1fa2',special:'#00838f'};
</script>
<script>
(function(){
  var LANG_KEY='besuchsplan_lang';
  function getLang(){
    var h=(location.hash||'').toLowerCase().replace(/^#/,'');
    if(h==='de'||h==='en')return h;
    return localStorage.getItem(LANG_KEY)||'de';
  }
  function setLang(l){
    lang=l;
    location.hash=l;
    localStorage.setItem(LANG_KEY,l);
  }
  var lang=getLang();

  var CACHE_KEY='besuchsplan_trans_cache';
  function getCache(){try{return JSON.parse(localStorage.getItem(CACHE_KEY)||'{}')}catch(e){return{}}}
  function setCache(c){try{localStorage.setItem(CACHE_KEY,JSON.stringify(c))}catch(e){}}
  function translateText(txt){
    return fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(txt)+'&langpair=de|en').then(function(r){return r.json()}).then(function(j){return(j.responseData&&j.responseData.translatedText)||txt}).catch(function(){return txt});
  }
  function translateAll(strings){
    var cache=getCache(),todo=[],out={};
    strings.forEach(function(s){if(cache[s])out[s]=cache[s];else todo.push(s)});
    if(todo.length===0)return Promise.resolve(out);
    function batch(i){
      if(i>=todo.length)return Promise.resolve();
      var chunk=todo.slice(i,i+3);
      return Promise.all(chunk.map(function(s){
        return translateText(s).then(function(t){out[s]=t;cache[s]=t});
      })).then(function(){return new Promise(function(r){setTimeout(r,120)})}).then(function(){return batch(i+3)});
    }
    return batch(0).then(function(){setCache(cache);return out});
  }

  var S=document.getElementById('slide');
  var M=document.getElementById('slideMobile');

  function el(tag,cls,st){var e=document.createElement(tag);if(cls)e.className=cls;if(st)Object.assign(e.style,st);return e}
  function capitalize(s){return s&&s.length>0?s.charAt(0).toUpperCase()+s.slice(1).toLowerCase():s}

  document.querySelectorAll('#langSwitch button').forEach(function(btn){
    btn.classList.toggle('active',btn.dataset.lang===lang);
    btn.onclick=function(){setLang(btn.dataset.lang);btn.parentElement.querySelectorAll('button').forEach(function(b){b.classList.toggle('active',b.dataset.lang===lang)});render();}
  });
  window.addEventListener('hashchange',function(){
    var l=getLang();
    if(l!==lang){lang=l;document.querySelectorAll('#langSwitch button').forEach(function(b){b.classList.toggle('active',b.dataset.lang===lang)});render();}
  });

  function getLegendObj(arr){var o={};LEGEND_KEYS.forEach(function(k,i){o[k]=arr[i]||''});return o}
  function getDisplayData(){
    var legArr=LEGEND_DE.split(', ');
    if(lang==='de')return{title:TITLE_DE,week:WEEK_DE,legend:getLegendObj(legArr),weeks:EVENTS};
    return window._translatedData||{title:TITLE_DE,week:WEEK_DE,legend:getLegendObj(legArr),weeks:EVENTS};
  }

  function render(){
    document.documentElement.lang=lang;
    if(lang==='en'){
      document.getElementById('translating').style.display='flex';
      var dateLabels=EVENTS.reduce(function(a,w){w.forEach(function(d){a.push(d.d)});return a},[]);
      var dateLabelsStr=dateLabels.filter(function(s,i,a){return a.indexOf(s)===i}).join('\n');
      var eventTexts=EVENTS.reduce(function(a,w){w.forEach(function(d){d.ev.forEach(function(e){a.push(e.t)})});return a},[]);
      var eventTextsUnique=eventTexts.filter(function(s,i,a){return a.indexOf(s)===i});
      var strings=[TITLE_DE,WEEK_DE,dateLabelsStr,LEGEND_DE].concat(eventTextsUnique);
      translateAll(strings).then(function(tr){
        var uniqueDates=dateLabels.filter(function(s,i,a){return a.indexOf(s)===i});
        var dates=tr[dateLabelsStr]?(tr[dateLabelsStr].split('\n').map(function(s){return s.trim()})):uniqueDates;
        var dateMap={};
        uniqueDates.forEach(function(d,i){dateMap[d]=dates[i]||d});
        var legendTr=tr[LEGEND_DE]?(tr[LEGEND_DE].split(/,\s*/).map(function(s){return capitalize(s.trim())})):LEGEND_DE.split(', ');
        window._translatedData={
          title:tr[TITLE_DE]||TITLE_DE,
          week:tr[WEEK_DE]||WEEK_DE,
          legend:getLegendObj(legendTr),
          weeks:EVENTS.map(function(w){return w.map(function(d){return{d:dateMap[d.d]||d.d,ev:d.ev.map(function(e){return{t:tr[e.t]||e.t,c:e.c,h:e.h}})};})})
        };
        document.getElementById('translating').style.display='none';
        renderInner();
      });
      return;
    }
    window._translatedData=null;
    renderInner();
  }

  function renderInner(){
    var D=getDisplayData();
    document.title=D.title;
    var allDays=D.weeks.reduce(function(a,w){return a.concat(w)},[]);
    var nWeeks=D.weeks.length;
    var yPos=nWeeks>1?function(i){return Y_TOP+(Y_BOT-Y_TOP)*i/(nWeeks-1)}:function(){return Y_TOP};

    document.getElementById('titleEl').textContent=D.title;
    document.getElementById('subtitleEl').textContent=(allDays[0]?allDays[0].d:'')+' – '+(allDays.length?allDays[allDays.length-1].d:'');

    while(S.children.length>3){S.removeChild(S.lastChild)}
    while(M.children.length>0){M.removeChild(M.lastChild)}

    var leg=el('div','legend');
    ['travel','school','family','activity','leisure','special'].forEach(function(k){
      var it=el('div','legend-item');
      it.appendChild(el('span','legend-dot',{background:C[k]}));
      it.appendChild(document.createTextNode(D.legend[k]));
      leg.appendChild(it);
    });
    S.appendChild(leg);

    var connSvg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    connSvg.setAttribute('class','connector-svg');
    connSvg.setAttribute('viewBox','0 0 2400 1080');
    connSvg.setAttribute('xmlns','http://www.w3.org/2000/svg');
    var defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
    var grad=document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
    grad.setAttribute('id','cg');
    grad.setAttribute('x1','1');grad.setAttribute('y1','0');grad.setAttribute('x2','0');grad.setAttribute('y2','1');
    var s1=document.createElementNS('http://www.w3.org/2000/svg','stop');
    s1.setAttribute('offset','0%');s1.setAttribute('stop-color','#90caf9');
    var s2=document.createElementNS('http://www.w3.org/2000/svg','stop');
    s2.setAttribute('offset','100%');s2.setAttribute('stop-color','#64b5f6');
    grad.appendChild(s1);grad.appendChild(s2);
    defs.appendChild(grad);
    connSvg.appendChild(defs);
    for(var c=0;c<nWeeks-1;c++){
      var y1=yPos(c),y2=yPos(c+1),mid=(y1+y2)/2;
      var p=document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d','M'+CONNECTOR_RIGHT+' '+y1+' C'+CONNECTOR_RIGHT+' '+mid+','+CONNECTOR_LEFT+' '+mid+','+CONNECTOR_LEFT+' '+y2);
      p.setAttribute('stroke','url(#cg)');
      p.setAttribute('stroke-width','10');
      p.setAttribute('fill','none');
      p.setAttribute('stroke-dasharray','12,8');
      p.setAttribute('opacity','.88');
      connSvg.appendChild(p);
    }
    S.appendChild(connSvg);

    for(var w=0;w<nWeeks;w++){
      var week=D.weeks[w],ly=yPos(w),nDays=week.length;
      var SP=nDays>1?(EX-SX)/(nDays-1):0;
      var hLine=el('div','h-line');
      hLine.style.top=(ly-2)+'px';
      S.appendChild(hLine);
      var wkLbl=el('div','wk-label');
      var wkTop=(nWeeks===2&&w===0)?58+LEGEND_OFFSET:(nWeeks===2&&w===1)?985+LEGEND_OFFSET:(ly-22);
      wkLbl.style.cssText='left:52px;top:'+wkTop+'px';
      wkLbl.textContent=(w+1)+'. '+D.week;
      S.appendChild(wkLbl);
      if(w===0){var startMk=el('div','start-mk');startMk.style.cssText='left:50px;top:'+ly+'px';S.appendChild(startMk)}
      if(w===nWeeks-1){var endMk=document.createElementNS('http://www.w3.org/2000/svg','svg');endMk.setAttribute('class','end-mk');endMk.setAttribute('viewBox','0 0 22 22');endMk.setAttribute('width','44');endMk.setAttribute('height','44');endMk.style.cssText='left:2320px;top:'+(ly-22)+'px';endMk.innerHTML='<polygon points="2,2 20,11 2,20" fill="#0d47a1"/>';S.appendChild(endMk)}
      var isTop=(w%2===0);
      for(var i=0;i<nDays;i++){
        var day=week[i],x=SX+(nDays>1?i*SP:0);
        S.appendChild(el('div','dot',{left:x+'px',top:ly+'px'}));
        var stemH=28,sTop,sBoxTop;
        if(isTop){sTop=ly+8;S.appendChild(el('div','stem',{left:x+'px',top:sTop+'px',height:stemH+'px'}));sBoxTop=sTop+stemH+2}
        else{sTop=ly-8-stemH;S.appendChild(el('div','stem',{left:x+'px',top:sTop+'px',height:stemH+'px'}));sBoxTop=sTop-2}
        var box=el('div','day-box'+(/^(Samstag|Sonntag|Saturday|Sunday)/.test(day.d)?' weekend-date':''));
        box.style.width=BW+'px';
        box.style.left=x+'px';
        box.style.top=sBoxTop+'px';
        box.style.transform=isTop?'translateX(-50%)':'translateX(-50%) translateY(-100%)';
        var hd=el('div','day-date');
        hd.textContent=day.d;
        box.appendChild(hd);
        day.ev.forEach(function(e){
          var row=el('div','day-event');
          row.appendChild(el('div','ev-bullet',{backgroundColor:C[e.c]}));
          var txt=el('div','ev-text'+(e.h?' highlight':''));
          txt.textContent=e.t;
          row.appendChild(txt);
          box.appendChild(row);
        });
        S.appendChild(box);
      }
    }

    function addMobileDay(day){
      var wrap=el('div','m-day');
      var box=el('div','m-day-box'+(/^(Samstag|Sonntag|Saturday|Sunday)/.test(day.d)?' weekend-date':''));
      var hd=el('div','m-day-date');
      hd.textContent=day.d;
      box.appendChild(hd);
      day.ev.forEach(function(e){
        var row=el('div','m-day-event');
        row.appendChild(el('div','m-ev-bullet',{backgroundColor:C[e.c]}));
        var txt=el('div','m-ev-text'+(e.h?' highlight':''));
        txt.textContent=e.t;
        row.appendChild(txt);
        box.appendChild(row);
      });
      wrap.appendChild(box);
      return wrap;
    }
    var mTitle=el('div','m-title');
    mTitle.textContent=D.title;
    mTitle.style.cssText='font-weight:700;color:#0d47a1;text-align:center';
    var mSub=el('div','m-subtitle');
    mSub.textContent=(allDays[0]?allDays[0].d:'')+' – '+(allDays.length?allDays[allDays.length-1].d:'');
    mSub.style.cssText='color:#5c6bc0;text-align:center';
    var mLeg=el('div','m-legend');
    ['travel','school','family','activity','leisure','special'].forEach(function(k){
      var it=el('div','m-legend-item');
      it.appendChild(el('span','m-legend-dot',{background:C[k]}));
      it.appendChild(document.createTextNode(D.legend[k]));
      mLeg.appendChild(it);
    });
    M.appendChild(mTitle);
    M.appendChild(mSub);
    M.appendChild(mLeg);
    var mTimeline=el('div','m-timeline');
    allDays.forEach(function(d){mTimeline.appendChild(addMobileDay(d))});
    M.appendChild(mTimeline);
  }

  function fit(){
