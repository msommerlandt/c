
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Frühlingsbesuch 2026 in San Francisco</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%;background:#1a2332;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
body{display:flex;justify-content:center;align-items:center;overflow-x:hidden}
.slide{width:2400px;height:1080px;position:relative;background:linear-gradient(160deg,#f8f9fd 0%,#edf0f8 40%,#e4e9f4 100%);overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.4);border-radius:6px;flex-shrink:0}
.slide-mobile{display:none;width:100%;max-width:100%;min-height:100vh;flex-direction:column;background:linear-gradient(160deg,#f8f9fd 0%,#edf0f8 50%,#e4e9f4 100%);padding:12px;padding-bottom:24px}
.accent-bar{position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#1565c0,#1976d2,#42a5f5,#1976d2,#1565c0);border-radius:6px 6px 0 0}
.title{position:absolute;top:10px;width:100%;text-align:center;font-size:34px;font-weight:700;color:#0d47a1;letter-spacing:.5px}
.subtitle{position:absolute;top:52px;width:100%;text-align:center;font-size:17px;color:#5c6bc0;font-weight:400;letter-spacing:.3px}
.h-line{position:absolute;left:50px;right:50px;height:5px;background:linear-gradient(90deg,#1565c0,#1e88e5,#1565c0);border-radius:2px;z-index:3}
.h-line.top{top:97px}
.h-line.bot{top:967px}
.wk-label{position:absolute;font-size:25px;color:#90a4ae;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;z-index:4}
.connector-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.dot{position:absolute;width:30px;height:30px;border-radius:50%;border:2.5px solid rgba(255,255,255,.92);background:#1565c0;transform:translate(-50%,-50%);box-shadow:0 2px 6px rgba(0,0,0,.22);z-index:6}
.stem{position:absolute;width:2px;transform:translateX(-50%);z-index:2;border-radius:1px;background:#1565c0;opacity:.35}
.day-box{position:absolute;border-radius:8px;padding:10px 12px;background:rgba(255,255,255,.88);box-shadow:0 2px 12px rgba(0,0,0,.07);border:1px solid rgba(21,101,192,.1);z-index:5}
.day-date{font-size:16px;font-weight:700;color:#0d47a1;margin-bottom:5px;padding-bottom:4px;border-bottom:1.5px solid rgba(21,101,192,.12)}
.day-box.weekend-date{background:rgba(215,235,255,.88)}
.day-event{display:flex;align-items:flex-start;gap:7px;margin-top:5px}
.ev-bullet{width:12px;height:12px;border-radius:50%;margin-top:4px;flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,.15)}
.ev-text{font-size:23.5px;line-height:1.4;color:#37474f}
.ev-text.highlight{font-weight:700}
.legend{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:28px;z-index:7}
.legend-item{display:flex;align-items:center;gap:10px;font-size:30px;color:#455a64}
.legend-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.start-mk{position:absolute;width:18px;height:18px;border-radius:50%;background:#0d47a1;transform:translate(-50%,-50%);box-shadow:0 2px 4px rgba(0,0,0,.15);z-index:6}
.end-mk{position:absolute;z-index:6}
@media (max-width:768px){
  body{overflow:auto;align-items:stretch;padding:0;-webkit-overflow-scrolling:touch}
  .slide{display:none!important}
  .slide-mobile{display:flex!important}
  .m-title{font-size:22px;padding:8px 0 2px}
  .m-subtitle{font-size:14px;padding-bottom:12px}
  .m-timeline{padding-left:20px;border-left:3px solid #1565c0;margin-left:10px}
  .m-day{margin-bottom:16px;position:relative}
  .m-day::before{content:'';position:absolute;left:-26px;top:8px;width:14px;height:14px;border-radius:50%;background:#1565c0;border:2px solid rgba(255,255,255,.9);box-shadow:0 1px 4px rgba(0,0,0,.2)}
  .m-day-box{background:rgba(255,255,255,.92);border-radius:8px;padding:12px 14px;margin-left:4px;border:1px solid rgba(21,101,192,.12);box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .m-day-box.weekend-date{background:rgba(215,235,255,.92)}
  .m-day-date{font-size:15px;font-weight:700;color:#0d47a1;margin-bottom:6px;padding-bottom:4px;border-bottom:1.5px solid rgba(21,101,192,.15)}
  .m-day-event{display:flex;align-items:flex-start;gap:8px;margin-top:6px}
  .m-ev-bullet{width:10px;height:10px;border-radius:50%;margin-top:5px;flex-shrink:0}
  .m-ev-text{font-size:15px;line-height:1.45;color:#37474f}
  .m-ev-text.highlight{font-weight:700}
  .m-legend{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;padding:16px 0 8px;font-size:14px;color:#455a64}
  .m-legend-item{display:flex;align-items:center;gap:6px}
  .m-legend-dot{width:10px;height:10px;border-radius:50%}
}
@media (min-width:769px){
  html,body{overflow:hidden}
  .slide-mobile{display:none!important}
}
@media print{html,body{background:#fff}.slide{box-shadow:none;border-radius:0}.slide-mobile{display:none!important}.slide{display:block!important}}
</style>
</head>
<body>
<div class="slide" id="slide">
  <div class="accent-bar"></div>
  <div class="title">Frühlingsbesuch 2026 in San Francisco</div>
  <div class="subtitle">Donnerstag, 19. März – Mittwoch, 1. April 2026</div>
  <div class="h-line top"></div>
  <div class="h-line bot"></div>
  <div class="wk-label" style="left:52px;top:60px">Woche 1</div>
  <div class="wk-label" style="left:52px;top:980px">Woche 2</div>
  <svg class="connector-svg" viewBox="0 0 2400 1080" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="cg" x1="1" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#90caf9"/><stop offset="100%" stop-color="#64b5f6"/></linearGradient></defs>
    <path d="M2350 100 C2350 535,50 535,50 970" stroke="url(#cg)" stroke-width="10" fill="none" stroke-dasharray="12,8" opacity=".88"/>
  </svg>
  <div class="start-mk" style="left:50px;top:100px"></div>
  <svg class="end-mk" style="left:2340px;top:959px;width:22px;height:22px" viewBox="0 0 22 22"><polygon points="2,2 20,11 2,20" fill="#0d47a1"/></svg>
</div>
<div class="slide-mobile" id="slideMobile"></div>
<script>
(function(){
  var S=document.getElementById('slide');
  var M=document.getElementById('slideMobile');
  var C={travel:'#c62828',school:'#1565c0',family:'#2e7d32',activity:'#e65100',leisure:'#7b1fa2',special:'#00838f'};

  var W1=[
    {d:'Donnerstag, 19. März',ev:[
      {t:'Flug nach San Francisco – Abflug Frankfurt um 13:20 Uhr, Ankunft in San Francisco um 16:55 Uhr Ortszeit',c:'travel'}
    ]},
    {d:'Freitag, 20. März',ev:[
      {t:'Emilia um 7:30 Uhr morgens zur Schule bringen',c:'school'},
      {t:'Tagsüber ausruhen und vom Jetlag erholen',c:'leisure'},
      {t:'Nachmittags gemeinsame Familienzeit genießen',c:'family'}
    ]},
    {d:'Samstag, 21. März',ev:[
      {t:'Emilias Fußballspiel von 11:00 Uhr bis 12:00 Uhr',c:'activity'},
      {t:'Nachmittags Tanzprobe von Leo und Emilia für das Schneewittchen-Ballett von 14:30 Uhr bis 16:30 Uhr',c:'activity'}
    ]},
    {d:'Sonntag, 22. März',ev:[
      {t:'Familientag – den ganzen Sonntag gemeinsam als Familie verbringen',c:'family'}
    ]},
    {d:'Montag, 23. März',ev:[
      {t:'Emilia morgens um 7:30 Uhr zur Schule bringen und nachmittags um 14:30 Uhr wieder abholen',c:'school'},
      {t:'Der restliche Tag steht zur freien Verfügung',c:'leisure'}
    ]},
    {d:'Dienstag, 24. März',ev:[
      {t:'Emilia morgens zur Schule bringen',c:'school'},
      {t:'Bei Interesse den ganzen Tag mit Leo verbringen',c:'family',h:true},
      {t:'Tanzunterricht für Emilia und Leo ab 16:00 Uhr mit kleiner Aufführung um 17:15 Uhr',c:'activity'}
    ]},
    {d:'Mittwoch, 25. März',ev:[
      {t:'Emilia morgens zur Schule bringen',c:'school'},
      {t:'Emilia um 15:00 Uhr abholen und mit dem Bus zum Fußballtraining fahren',c:'activity'}
    ]}
  ];

  var W2=[
    {d:'Donnerstag, 26. März',ev:[
      {t:'Emilia morgens zur Schule bringen',c:'school'},
      {t:'Mutter-Sohn-Tag – Martin nimmt sich den Tag frei',c:'family',h:true},
      {t:'Geigenunterricht am späten Nachmittag für beide Kinder (17:15–18:15 Uhr)',c:'activity'}
    ]},
    {d:'Freitag, 27. März',ev:[
      {t:'Emilias Frühlingsferien beginnen!',c:'special',h:true},
      {t:'Den ganzen Tag mit Emilia verbringen',c:'family'}
    ]},
    {d:'Samstag, 28. März',ev:[
      {t:'Familientag – den ganzen Samstag gemeinsam als Familie verbringen',c:'family'}
    ]},
    {d:'Sonntag, 29. März',ev:[
      {t:'Geburtstagsfeier: Aiyanas 5. Geburtstag – wir sind gebeten mitzuhelfen',c:'special',h:true}
    ]},
    {d:'Montag, 30. März',ev:[
      {t:'Den ganzen Tag mit Emilia verbringen',c:'family'}
    ]},
    {d:'Dienstag, 31. März',ev:[
      {t:'Den ganzen Tag mit Emilia verbringen',c:'family'}
    ]},
    {d:'Mittwoch, 1. April',ev:[
      {t:'Den ganzen Tag mit Emilia verbringen',c:'family'},
      {t:'Rückflug ab San Francisco um 19:15 Uhr, Ankunft Frankfurt am Donnerstag, 2. April um 15:15 Uhr Ortszeit',c:'travel'}
    ]}
  ];

  var TY=100,BY=970,SX=170,EX=2230;
  var SP=(EX-SX)/6;
  var BW=300;

  function el(tag,cls,st){var e=document.createElement(tag);if(cls)e.className=cls;if(st)Object.assign(e.style,st);return e}

  function addDay(day,x,ly,isTop){
    S.appendChild(el('div','dot',{left:x+'px',top:ly+'px'}));

    var stemH=28;
    var sTop=isTop?ly+8:ly-8-stemH;
    S.appendChild(el('div','stem',{left:x+'px',top:sTop+'px',height:stemH+'px'}));

    var box=el('div','day-box'+(/^(Samstag|Sonntag)/.test(day.d)?' weekend-date':''));
    box.style.width=BW+'px';
    box.style.left=x+'px';
    if(isTop){
      box.style.top=(sTop+stemH+2)+'px';
      box.style.transform='translateX(-50%)';
    }else{
      box.style.top=(sTop-2)+'px';
      box.style.transform='translateX(-50%) translateY(-100%)';
    }

    var hd=el('div','day-date');
    hd.textContent=day.d;
    box.appendChild(hd);

    day.ev.forEach(function(e){
      var row=el('div','day-event');
      row.appendChild(el('div','ev-bullet',{backgroundColor:C[e.c]}));
      var txt=el('div','ev-text'+(e.h?' highlight':''));
      txt.textContent=e.t;
      row.appendChild(txt);
      box.appendChild(row);
    });

    S.appendChild(box);
  }

  for(var i=0;i<7;i++) addDay(W1[i],SX+i*SP,TY,true);
  for(var i=0;i<7;i++) addDay(W2[i],SX+i*SP,BY,false);

  function addMobileDay(day){
    var wrap=el('div','m-day');
    var box=el('div','m-day-box'+(/^(Samstag|Sonntag)/.test(day.d)?' weekend-date':''));
    var hd=el('div','m-day-date');
    hd.textContent=day.d;
    box.appendChild(hd);
    day.ev.forEach(function(e){
      var row=el('div','m-day-event');
      row.appendChild(el('div','m-ev-bullet',{backgroundColor:C[e.c]}));
      var txt=el('div','m-ev-text'+(e.h?' highlight':''));
      txt.textContent=e.t;
      row.appendChild(txt);
      box.appendChild(row);
    });
    wrap.appendChild(box);
    return wrap;
  }
  var mTitle=el('div','m-title');
  mTitle.textContent='Frühlingsbesuch 2026 in San Francisco';
  mTitle.style.cssText='font-weight:700;color:#0d47a1;text-align:center';
  var mSub=el('div','m-subtitle');
  mSub.textContent='Donnerstag, 19. März – Mittwoch, 1. April 2026';
  mSub.style.cssText='color:#5c6bc0;text-align:center';
  var mTimeline=el('div','m-timeline');
  var allDays=W1.concat(W2);
  allDays.forEach(function(d){mTimeline.appendChild(addMobileDay(d))});
  var mLeg=el('div','m-legend');
  [{k:'travel',l:'Reise'},{k:'school',l:'Schule'},{k:'family',l:'Familie'},{k:'activity',l:'Aktivitäten'},{k:'leisure',l:'Freizeit'},{k:'special',l:'Besonderes'}].forEach(function(c){
    var it=el('div','m-legend-item');
    it.appendChild(el('span','m-legend-dot',{background:C[c.k]}));
    it.appendChild(document.createTextNode(c.l));
    mLeg.appendChild(it);
  });
  M.appendChild(mTitle);
  M.appendChild(mSub);
  M.appendChild(mTimeline);
  M.appendChild(mLeg);

  var leg=el('div','legend');
  [{k:'travel',l:'Reise'},{k:'school',l:'Schule'},{k:'family',l:'Familie'},{k:'activity',l:'Aktivitäten'},{k:'leisure',l:'Freizeit'},{k:'special',l:'Besonderes'}].forEach(function(c){
    var it=el('div','legend-item');
    it.appendChild(el('span','legend-dot',{background:C[c.k]}));
    it.appendChild(document.createTextNode(c.l));
    leg.appendChild(it);
  });
  S.appendChild(leg);

  function fit(){
    var w=window.innerWidth;
    if(w<=768){
      S.style.transform='none';
      S.style.display='none';
    }else{
      S.style.display='block';
      var s=Math.min(w/2400,window.innerHeight/1080);
      S.style.transform='scale('+s+')';
      S.style.transformOrigin='center center';
    }
  }
  window.addEventListener('resize',fit);
  fit();
})();
</script>
</body>
</html>
